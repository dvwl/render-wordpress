services:
- type: web
  name: wordpress
  env: docker
  region: singapore
  plan: starter
  autoDeploy: false
  disk:
    name: wordpress
    mountPath: /var/www/html
    sizeGB: 10
  envVars:
  - key: WORDPRESS_DB_HOST
    fromService:
      name: mysql-wordpress
      type: pserv
      property: host
  - key: WORDPRESS_DB_NAME
    fromService:
      name: mysql-wordpress
      type: pserv
      envVarKey: MYSQL_DATABASE
  - key: WORDPRESS_DB_USER
    fromService:
      name: mysql-wordpress
      type: pserv
      envVarKey: MYSQL_USER
  - key: PHP_INI_SCAN_DIR
    value: :/var/www/html/wp-content
  - key: WORDPRESS_DB_PASSWORD
    fromService:
      name: mysql-wordpress
      type: pserv
      envVarKey: MYSQL_PASSWORD
  - key: WORDPRESS_CONFIG_EXTRA
    value: |
      define('FS_METHOD', 'direct');
      define('WP_FS__SKIP_CONNECT_EVERYWHERE', true);
  - key: TAR_OPTIONS
    value: --no-same-owner --no-same-permissions
- type: pserv
  name: mysql-wordpress
  repo: https://github.com/dvwl/render-mysql.git
  env: docker
  region: singapore
  plan: starter
  autoDeploy: false
  disk:
    name: mysql-wordpress
    mountPath: /var/lib/mysql
    sizeGB: 10
  envVars:
  - key: MYSQL_DATABASE
    value: mysql
  - key: MYSQL_USER
    value: mysql
  - key: MYSQL_PASSWORD
    generateValue: true
  - key: MYSQL_ROOT_PASSWORD
    generateValue: true
